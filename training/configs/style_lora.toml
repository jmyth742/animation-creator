# =============================================================================
# Style LoRA — Image-based training
# Teaches the model a consistent visual aesthetic for your animated series.
# Best for: unified color palette, rendering style, lighting mood
# =============================================================================

# --- Model ---
pretrained_model_name_or_path = "/workspace/models/hunyuan_video_I2V_720_fp16.safetensors"
vae = "/workspace/models/vae_dir/vae"
text_encoder1 = "/workspace/models/text_encoder"
clip = "/workspace/models/clip_vision/sigclip_vision_patch14_384.safetensors"

# --- Dataset ---
dataset_config = "configs/style_dataset.toml"

# --- Output ---
output_dir = "/workspace/outputs/style_lora"
output_name = "style_lora"
save_every_n_steps = 100
save_state = false

# --- LoRA settings ---
network_module = "networks.lora"
network_dim = 32          # LoRA rank — 16-64 range; 32 is a good default
network_alpha = 16        # Usually rank/2 or equal to rank

# --- Training ---
max_train_steps = 1000    # Start here, check outputs at 200/500/1000
learning_rate = 0.0002
optimizer_type = "adamw8bit"
lr_scheduler = "cosine_with_restarts"
lr_warmup_steps = 50

train_batch_size = 1
gradient_accumulation_steps = 4
gradient_checkpointing = true
mixed_precision = "bf16"
seed = 42

# --- Memory optimization (for A6000 48GB, adjust for your GPU) ---
# blocks_to_swap = 0      # Increase if OOM (offloads transformer blocks to CPU)
# fp8_llm = false          # Set true for <24GB VRAM (quantizes text encoder)
# fp8_fast = false          # Optimized FP8 for RTX 40-series

# --- Logging ---
logging_dir = "/workspace/outputs/style_lora/logs"
log_with = "tensorboard"
